# base-col.yaml — AUTHORED collision-proxy parts for client/assets/bases/base.glb.
#
# Hand-authored convex parts that hug the visible station masses MUCH tighter than the single
# QuickHull shrink-wrap, while leaving the docking-bay corridors open. Coordinates are in the
# GLB's authored mesh units (same space as the POSITION cloud; the station is centred at the
# origin, longest axis = Z, span ~ [-12,-11,-16]..[12,11,16]).
#
# `bake.py` turns each part into one small convex COL_<name> mesh node and HARD-validates that
# every part vertex sits >= `margin` inside the visual convex hull (so the merged hull, its
# LongestAxis and BoundingRadius are unchanged for the pre-B2 collision code) and that the dock
# corridors stay clear of every part. Edit here, then `uv run bake.py`.
#
# Station layout (see tools/base-col/preview/*.png):
#   Core   — the bulky central hub where the arms/spindles meet.
#   Tower  — the antenna/superstructure stack rising along +Y above the hub.
#   Keel   — the under-hub keel block hanging below the centre (kept clear of the aft bay).
#   ArmL/R — the two wide wings reaching out along -X / +X.
#   Fore   — the forward (+Z) spindle module.
#   Aft    — the aft (-Z) spindle module (upper body only; the docking bay sits below it).

margin: 0.05          # required interior clearance (authored units) from every visual-hull face
corridor_tol: 0.05    # a corridor sample this far inside any part counts as a blockage

# AUTO MODE (default). The hand-authored star-of-boxes below leaves gaps a ship (radius
# CollisionConfig.ShipRadius, ~0.54 AUTHORED units after world-scaling) can fly THROUGH into the
# hollow station interior. `auto: true` instead drives coverage off the ACTUAL mesh volume: voxelize
# the visual triangles, flood-fill + seal the hollow interior, carve the dock corridors back open,
# greedy-merge into axis-aligned boxes, clamp each strictly inside the visual hull, and hard-assert
# (the new reachability guard) that no ship-radius path from outside can reach the interior. The bake
# regenerates the boxes from base.glb every run (deterministic) and also writes the resolved list to
# base-col.generated.yaml for review. Set `auto: false` to fall back to the authored `parts:` list.
auto: true
auto_config:
  voxel_res: 0.5        # authored units/cell for the solid-fill + reachability grid (ship ~0.54 AU ≈ 1 cell)
  box_res: 1.5          # coarser authored units/cell for the BULK greedy box merge (tunes bulk box count)
  pad: 0.5              # grow every merged box outward this many authored units (~2.8 world) BEFORE the
                        # hull-containment clamp, so collision reaches the visual surface instead of
                        # stopping inside the thin outer shell — ships bounce at/just outside the hull,
                        # not sunk into it. The clamp still wins at the extremity tips (metric-neutral).
                        # The dock corridors are carved `pad` wider so they don't re-close (padded boxes
                        # grow back exactly to the true corridor wall, never into the flyable tube).
  shell: true           # SHELL PASS: after the bulk decomposition, cover every VISIBLE-SURFACE voxel that
                        # still has no box on it (the concavity WALLS + outer skin) with thin, padded,
                        # hull-clamped, corridor-retreated boxes, so a ship bounces AT the visible surface
                        # instead of sinking to an interior box before it bounces. This is the visual-sink
                        # fix; it adds many boxes (each is 6 cheap planes — accepted). Concavity walls sit
                        # inside the convex hull, so their outward pad is NOT clamped — that is exactly
                        # where the sink was worst and where the shell wins most. Set false for the old
                        # bulk-only behaviour. Raises surface coverage ~72% -> ~89% and mean visual sink
                        # (over ALL surface) ~1.4w -> ~0.4w. The residual ~11% uncovered is the convex
                        # skin / thin protrusions the metric-neutrality clamp forbids covering.
  shell_iters: 6        # shell re-passes: clamping/retreating one shell box can leave a neighbour surface
                        # voxel newly exposed; iterate until the uncovered set stops shrinking (converges
                        # in ~3-4 on this model). Each candidate box is kept only if it covers a still-
                        # uncovered surface voxel, so the count stays honest (bulk 118 + shell 280 = ~398).
  corridor_clearance: 0.5   # extra authored units beyond ship radius when a corridor radius is derived
  corridor_approach: 5.0    # authored units a dock corridor is carved OUTWARD past each hardpoint
  # ship_radius / corridor_radius default from CollisionConfig via ws; override here only to experiment.

# Each limb-box is kept thin in its two off-axis dimensions: the visual hull is star-shaped, so a
# box that reaches far along more than one axis at once gets sliced by a diagonal hull face. Thin,
# limb-aligned boxes hug the actual (thin) limb cross-sections and stay well inside the hull. These
# are used ONLY when `auto: false`.
parts:
  # Central hub — the bulky core where every limb meets.
  - name: Core
    box: {center: [0.0, -0.5, 0.0], size: [11.0, 9.0, 6.0]}

  # Antenna/superstructure stack rising along +Y.
  - name: Tower
    box: {center: [0.0, 5.5, 1.5], size: [5.5, 7.0, 5.0]}

  # Under-hub keel block (Z kept tight so it never reaches the aft docking bay at Z≈-6..-10).
  - name: Keel
    box: {center: [0.0, -6.0, 0.0], size: [6.5, 5.5, 3.2]}

  # Port wing reaching out along -X (wide in X, thin in Y/Z to follow the tapering arm).
  - name: ArmL
    box: {center: [-7.0, 0.0, -0.3], size: [7.6, 4.0, 2.2]}

  # Starboard wing reaching out along +X.
  - name: ArmR
    box: {center: [7.0, 0.0, -0.3], size: [7.6, 4.0, 2.2]}

  # Forward (+Z) spindle module (long in Z, thin in X/Y).
  - name: Fore
    box: {center: [0.0, 1.5, 7.5], size: [3.0, 4.0, 9.0]}

  # Aft (-Z) spindle module — upper body only; the docking bay hangs below it.
  - name: Aft
    box: {center: [0.0, 1.5, -8.5], size: [4.0, 5.0, 9.0]}
