# Local-dev / single-box deployment of the stellarallegiance backend:
#   sim-server    the 20 Hz authoritative match + lobby host (clients connect & download content)
#   public-lobby  the PUBLIC LOBBY: game-server registry + WebRTC signaling relay
#
# Discovery is DIRECT-FIRST: when a sim-server registers, the lobby probes its port and, if it's
# reachable, advertises a direct host:port — clients then connect straight to it over WebSocket (no
# traffic through the lobby). A server that isn't reachable (NAT, no port-forward) falls back to
# WebRTC + public STUN, with only the tiny SDP handshake relayed through public-lobby. There is no
# TURN relay — clients that can't hole-punch a NAT'd server can't join it (forward a port for the
# widest reach).
#
# NOTE (single-box compose): the lobby probes the sim-server's container IP here, so the advertised
# endpoint is only reachable on this host's docker network — fine for local/dev. For a real
# deployment run public-lobby on its own public box; player servers then probe from their real IP.
#
# TLS: the sim server speaks plain ws:// on :8090; production terminates TLS at the ingress.
#
# First run:
#   cp .env.example .env && edit .env
#   docker compose up --build
services:
  sim-server:
    build:
      context: .                     # repo root, so ../shared resolves (see server/Dockerfile)
      dockerfile: server/Dockerfile
    environment:
      # Optional shared-secret password. Leave empty for an open server (LAN/dev); set it to
      # require every client's Hello to carry the same secret.
      SIM_SECRET: ${SIM_SECRET:-}
      # Set to 1 to skip the lobby ready-up and run a perpetual match (bots / benchmarking).
      SIM_AUTOSTART: ${SIM_AUTOSTART:-}
      # Public-lobby publishing (opt-in): set SIM_PUBLIC_NAME (3-50 chars) to register this server
      # with the lobby below so clients can discover + WebRTC-join it. Empty = private (direct only).
      SIM_PUBLIC_NAME: ${SIM_PUBLIC_NAME:-}
      PUBLIC_LOBBY: ${PUBLIC_LOBBY:-public-lobby:8091}
      # Public-facing port the lobby probes/advertises (default = listen port; set when a
      # port-forward maps a different external port).
      SIM_PUBLIC_PORT: ${SIM_PUBLIC_PORT:-}
      # Optional host:port this server asserts as its reachable address (e.g. the host's LAN/public
      # address when it's behind container NAT or a proxy). The lobby probes it and advertises it
      # only if it answers /health. Unset = the lobby uses the registration source IP.
      SIM_PUBLIC_ENDPOINT: ${SIM_PUBLIC_ENDPOINT:-}
    ports:
      - "${SIM_PORT:-8090}:8090"
    depends_on:
      - public-lobby
    restart: unless-stopped

  # Public lobby: game-server registry + WebRTC signaling relay (no game traffic flows through it).
  # On register it probes each server's port to decide direct-vs-WebRTC; it hands out the STUN
  # config below for the WebRTC fallback.
  public-lobby:
    build:
      context: .                     # repo root, so it builds uniformly with sim-server / railway up
      dockerfile: public-lobby/Dockerfile
    environment:
      SHARE_PORT: 8091
      # Public STUN handed to clients/servers for the WebRTC fallback (covers ~80% of NATs via
      # hole-punching). Comma-separate several to list fallbacks, e.g. "stun:a:3478,stun:b:19302".
      STUN_URL: ${STUN_URL:-stun:stun.cloudflare.com:3478}
    ports:
      - "${SHARE_PORT:-8091}:8091"
    restart: unless-stopped
