# Stations â€” the team base. radiusâ†’BaseDef.radius, max-armorâ†’BaseDef.max-health. base-type-id is an
# explicit runtime extension. The faction's initial station MUST carry the 'restart' ability
# (CoreValidator). Reproduces stock.yaml's Garrison.
#
# Hardpoints are GLB-authoritative (HardpointGeometryMerge): model-name binds base.glb, whose
# HP_DockingEntrance_* / HP_DockingExit_0 / HP_Light_* nodes supply the docking discs + nav lights
# in the exact frame World.LoadBase already uses for the server dock geometry â€” so the streamed
# client markers and the server dock discs come from one source. No YAML hardpoints authored: every
# mesh node appends (by kind byte, then index) â†’ 12 lights, 5 docking entrances, 1 docking exit = 18.
stations:
  - id: garrison
    name: Garrison
    base-type-id: 0
    class: garrison
    model-name: base    # res://assets/bases/<model-name>.glb â€” supplies all hardpoints via merge
    radius: 90
    max-armor: 2000
    # Fog-of-war vision: an unoccluded sphere the garrison contributes to its team from tick 0.
    vision-sphere-radius: 1500
    radar-signature: 2.5   # a base is seen from far away
    abilities: [start, restart]
    required-capabilities: [base]
