# Stations — the team base. radius→BaseDef.radius, max-armor→BaseDef.max-health. base-type-id is an
# explicit runtime extension. The faction's initial station MUST carry the 'restart' ability
# (CoreValidator). Reproduces stock.yaml's Garrison.
#
# Hardpoints are GLB-authoritative (HardpointGeometryMerge): model-name binds the base GLB, whose
# HP_DockingEntrance_* / HP_DockingExit_* / HP_Light_* / HP_Turret_* nodes supply the docking doors
# + nav lights in the exact frame World.LoadBase already uses for the server dock geometry — so the
# streamed client markers and the server dock discs come from one source. No YAML hardpoints
# authored: every mesh node appends (by kind byte, then index) → garrison.glb carries 44 lights,
# 10 docking entrances (2 doors), 2 docking exits, 4 turrets = 60.
stations:
  - id: garrison
    name: Garrison
    base-type-id: 0
    class: garrison
    model-name: garrison   # res://assets/bases/<model-name>.glb — supplies all hardpoints via merge
    radius: 90
    max-armor: 2000
    # Fog-of-war vision: an unoccluded sphere the garrison contributes to its team from tick 0.
    vision-sphere-radius: 3600
    radar-signature: 2.5   # a base is seen from far away
    abilities: [start, restart]
    research-slots: 1      # concurrent research orders this base can run (0 => 1 at projection)
    required-capabilities: [base]

  # ---- Catalog-only future stations (NO base-type-id => never projected to a runtime BaseDef; see
  # FactionsContentProjection.cs `Where(s => s.BaseTypeId is not null)`). These populate the docked
  # Build tab as buildable cards with tech/capability lock states, but have no in-world effect yet
  # (base building lands in a later phase). Gating uses the closed Capability enum for granted-*, and
  # required-techs (from developments.yaml) where the tree is research-gated.
  # Outpost — the first constructor-built forward base (v37). base-type-id makes it a RUNTIME base
  # (projected to a BaseDef, streamed, spawnable); model-name binds Outpost.glb (server collision +
  # client mesh). build-on-rock-class gates which asteroid a constructor may raise it on (Regolith =
  # the common class, so expansion is always possible). NO `start` ability => not a win-condition
  # base (destroying it doesn't end the match). Grants expansion-allowed on completion.
  - id: outpost
    name: Outpost
    base-type-id: 1
    class: garrison
    model-name: Outpost   # res://assets/bases/Outpost.glb
    description: "A light forward garrison — eyes and a foothold in a contested sector."
    radius: 55
    max-armor: 800
    vision-sphere-radius: 2400
    radar-signature: 1.8
    price: 300
    build-time-seconds: 45
    build-on-rock-class: regolith
    abilities: [land, repair, capture]
    required-capabilities: [base]         # buildable from match start (the expansion entry point)
    granted-capabilities: [expansion-allowed]  # raising one opens the rest of the expansion tree

  - id: shipyard
    name: Shipyard
    class: shipyard
    description: "Builds and services ships away from the home garrison."
    price: 600
    build-time-seconds: 90
    abilities: [land, repair, capture]
    required-capabilities: [expansion-allowed]
    granted-capabilities: [shipyard-allowed]

  - id: refinery
    name: Refinery
    class: mining
    description: "Processes mined helium-3 on-site, shortening the haul back to base."
    price: 400
    build-time-seconds: 60
    income: 50
    abilities: [unload, capture]
    required-capabilities: [expansion-allowed]

  - id: tech-lab
    name: Technology Lab
    class: research
    description: "Hosts advanced research and unlocks the tactical doctrine tree."
    price: 500
    build-time-seconds: 75
    research-slots: 2
    abilities: [land, capture]
    required-techs: [tactical-1]
    granted-capabilities: [tactical-allowed]

  - id: supremacy-center
    name: Supremacy Center
    class: starbase
    description: "The team's supremacy fortress — raising it unlocks the supremacy victory path."
    price: 1500
    build-time-seconds: 150
    abilities: [land, repair, capture]
    required-capabilities: [shipyard-allowed]
    required-techs: [heavy-ordnance]
    granted-capabilities: [supremacy-allowed]

  - id: expansion-complex
    name: Expansion Complex
    class: garrison
    description: "Command-and-logistics hub that authorizes the team to expand into new sectors."
    price: 450
    build-time-seconds: 70
    abilities: [land, repair, capture]
    required-techs: [expansion-1]
    granted-capabilities: [expansion-allowed]

  - id: teleport-receiver
    name: Teleport Receiver
    class: ripcord
    description: "A ripcord waypoint that pulls friendly ships across the map to a forward line."
    price: 350
    build-time-seconds: 60
    abilities: [ripcord, land]
    required-capabilities: [expansion-allowed]
