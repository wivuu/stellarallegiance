# Launchers — the missile racks a hull mounts via a { kind: weapon, weapon-id: N } hardpoint. A
# launcher carrying a weapon-id projects to a WeaponKind.Missile WeaponDef whose ballistics come from
# the referenced missile expendable (expendables.yaml); the launcher itself supplies the magazine
# (amount → MagazineSize), the launch cadence (fire-interval-ticks, tick domain to avoid rounding
# drift) and the mounted mass (counts against the hull's payload-capacity, like a gun's mass).
# weapon-id shares the namespace with weapons.yaml guns (0/1/2 = scout/fighter/bomber cannons).
launchers:
  - id: missile-rack
    name: Missile Rack
    slot: magazine
    mass: 4
    amount: 6
    expendable-id: seeker-missile
    weapon-id: 3
    fire-interval-ticks: 30
    required-capabilities: [base]
  - id: dart-rack
    name: Dart Rack
    slot: magazine
    mass: 3
    amount: 8
    expendable-id: dart-missile
    weapon-id: 4
    fire-interval-ticks: 20
    required-capabilities: [base]
  - id: torpedo-rack
    name: Torpedo Rack
    slot: magazine
    mass: 4
    amount: 6
    expendable-id: anti-base-torpedo
    weapon-id: 5
    fire-interval-ticks: 60
    required-capabilities: [base]

  # Chaff / mine dispensers. Unlike the racks above these are NOT mounted on a hull hardpoint —
  # they project to Chaff/Mine-kind WeaponDefs the sim resolves from a ship's spawn cargo via the
  # dispensed expendable's cargo-id (D8). mass 0: the payload cost is the carried consumables, not
  # the dispenser. amount is a nominal magazine; the real ammo is the cargo count chosen in the hangar.
  - id: decoy-dispenser
    name: Decoy Dispenser
    slot: chaff-launcher
    mass: 0
    amount: 1
    expendable-id: sensor-decoy
    weapon-id: 6
    fire-interval-ticks: 40
    required-capabilities: [base]
  - id: mine-dispenser
    name: Mine Dispenser
    slot: dispenser
    mass: 0
    amount: 1
    expendable-id: proximity-mine
    weapon-id: 7
    fire-interval-ticks: 100
    required-capabilities: [base]
  - id: probe-dispenser
    name: Probe Dispenser
    slot: dispenser
    mass: 0
    amount: 1
    expendable-id: recon-probe
    weapon-id: 8
    fire-interval-ticks: 100
    required-capabilities: [base]
