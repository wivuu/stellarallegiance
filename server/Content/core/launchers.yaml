    required-techs: [seeker-2]
    obsoleted-by-techs: [seeker-3]
    successor-part-id: seeker-rack-3
  - id: seeker-rack-3
    name: MRM Seeker 3
    slot: magazine
    mass: 4
    amount: 6
    expendable-id: mrm-seeker-3
