# Launchers — the missile racks a hull mounts via a { kind: weapon, weapon-id: N } hardpoint. A
# launcher carrying a weapon-id projects to a WeaponKind.Missile WeaponDef whose ballistics come from
# the referenced missile expendable (expendables.yaml); the launcher itself supplies the magazine
# (amount → MagazineSize), the launch cadence (fire-interval-ticks, tick domain to avoid rounding
# drift) and the mounted mass (counts against the hull's payload-capacity, like a gun's mass).
# weapon-id shares the namespace with weapons.yaml guns (0-2/9-11/12-14/15-17 = the gun lines).
#
# Iron Coalition ordnance import (Phase 6, PCore014.igc) — the IGC Iron Coalition extraction is the
# SOURCE OF TRUTH for what a hull can carry. Weapon-ids 3-8 keep their kind/placement (in-place
# tier-1 replacement of the AI-invented missile-rack/dart-rack/torpedo-rack/decoy-mine-probe
# dispensers); 18-32 append the tier-2/3 chains for those four lines plus the new SRM Dumbfire line
# (24-26, no tier-1 placeholder to replace — it's wholly new). Tier succession mirrors the gun lines
# exactly: each non-top tier carries obsoleted-by-techs (the NEXT tier's tech — once owned the hangar
# hides this tier) + successor-part-id (the next-tier weapon a saved loadout or spawn dispenser
# migrates to — Simulation.ResolveLoadout / SeedDispenserAmmo, mirrored client-side by
# ShipLoadout.MigrateTier). Chaff/mine/probe dispensers additionally tier the WEAPON, not the cargo
# item: expendables.yaml keeps exactly one tier-neutral cargo row per line (cargo-ids stay 2/3/4,
# carried ONLY by the tier-1 expendable) and the fired tier resolves from owned techs at spawn.
#
# D3 (deliberate, tested behavior): IGC hull magazine partMasks — which hull can mount which rack —
# are NOT enforced here. Our schema has no per-mount compatibility mask; LoadoutTest exercises
# mounting a rack on a hull IGC never paired it with (e.g. a Quickfire rack on the Scout) as a
# FEATURE of the open mount model. Payload budgets (hulls.yaml payload-capacity) make abuse costly
# without a hardcoded mask.
launchers:
  # ---- MRM Seeker 1/2/3 (weapon-ids 3/18/19) ----
  - id: seeker-rack-1
    name: MRM Seeker 1
    slot: magazine
    mass: 4
    amount: 6
    expendable-id: mrm-seeker-1
    weapon-id: 3
    fire-interval-ticks: 30
    required-capabilities: [base]
    obsoleted-by-techs: [seeker-2]
    successor-part-id: seeker-rack-2
  - id: seeker-rack-2
    name: MRM Seeker 2
