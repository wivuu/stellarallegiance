# Hulls — the playable ships + the escape pod. Flight stats derive onto the runtime ShipClassDef:
#   mass→mass, speed→max-speed, thrust→accel, max-turn-rates→rate-*-deg, armor-hit-points→max-hull,
#   strafe/reverse-thrust-multiplier→side/back-mult. class-id, drift-*-deg, ab-*, and hardpoints are
#   explicit runtime extensions. Numbers reproduce server/Content/stock.yaml exactly.
#   payload-capacity = the hull's payload budget (mounted weapon mass + cargo hold). Every armed
#   hull MUST author enough for its default hardpoint weapons — CoreValidator refuses to boot otherwise.
#   Shield (optional, all keys omitted = no shield): shield-capacity is a regenerating energy pool that
#   absorbs incoming damage BEFORE the hull (overflow from a shield-popping hit spills into the hull the
#   same tick); shield-recharge is points/second, resuming shield-delay seconds after the last shield hit.
#   A hull authoring shield-capacity MUST author a positive shield-recharge (else it never comes back) —
#   ContentValidator refuses to boot otherwise. Scout/Pod carry no shield; Fighter/Bomber do.
#   Afterburner fuel (optional, gauges the afterburner): max-fuel is the tank size; ab-fuel-drain is
#   burned per second while the afterburner is engaged; ab-fuel-recharge trickles back per second
#   while the boost input is released. A hull authoring ab-accel > 0 MUST also author max-fuel (and vice versa) —
#   CoreValidator refuses to boot on a mismatched pair. ab-fuel-recharge: 0 is a valid, deliberate
#   convention meaning "dock-only": the tank never refills in flight, only on relaunch (spawn-time
#   init refuels — see Simulation.SpawnCombatShip). Scout/Bomber/Pod have no afterburner and
#   author none of these keys (max-fuel <= 0 = unmodeled, i.e. legacy unlimited boost).
#   Signature (optional): radar-signature scales every viewer's fog detection range against this
#   hull; signature is an ADDITIVE per-hull bias on top of it (radar-signature units, default 0),
#   summed at projection with the preferred-parts loadout's per-part signature values into the
#   hull's equipment bias (ShipClassDef.SignatureBias). No stock hull authors it — author it to
#   make a hull read louder/quieter than its class baseline without retuning radar-signature.
hulls:
  # Scout (class-id 0): a single main nozzle; one near-pinpoint cannon.
  - id: scout
    name: Scout
    glyph: "▲"
    role: RECON
    description: "Fastest hull in the fleet. Finds the fight, paints targets, and outruns what it can't kill."
    model-name: scout   # res://assets/ships/<model-name>.glb (else procedural placeholder)
    model-length: 4.5   # world-unit silhouette length the client normalizes the GLB to
    class-id: 0
    mass: 40
    speed: 160
    thrust: 30
    max-turn-rates: { yaw: 50, pitch: 50, roll: 50 }
    strafe-thrust-multiplier: 0.5
    reverse-thrust-multiplier: 0.25
    drift-yaw-deg: 5
    drift-pitch-deg: 5
    ab-accel: 0
    ab-on-rate: 2.0
    ab-off-rate: 1.0
    armor-hit-points: 60
    shield-capacity: 60   # regenerating shield absorbed before hull
    shield-recharge: 8    # points/sec once the quiet delay elapses (~7.5 s to full)
    shield-delay: 3       # seconds after the last shield hit before recharge resumes
    # Fog-of-war vision: long-range directional cone (occluded by asteroids) + omnidirectional
    # proximity sphere (unoccluded). Scouts trade armor for the best eyes in the fleet.
    vision-cone-length: 2400
    vision-cone-angle-deg: 30
    vision-sphere-radius: 1080  # 900 x1.2 — scout's omnidirectional radar bubble
    radar-signature: 0.5   # small + quiet — must be approached closer before being seen
    price: 100
    payload-capacity: 12 # cannon 2 + missile rack 4 = 6 -> 6 free for cargo
    required-capabilities: [base]
    # GLB is authoritative for the hardpoint inventory + geometry (HardpointGeometryMerge). A YAML
    # entry BINDS a weapon-id to a mesh HP_<Kind>_<Index> node and inherits its position/direction
    # unless it authors off-*/dir-* to override. Unclaimed mesh nodes append at the end (by kind,
    # index): Booster_0/1 nozzles, Thruster_0 + Light_0..2.
    hardpoints:
      - { kind: weapon, index: 0, weapon-id: 0 }   # binds mesh HP_Weapon_0 (cannon; geometry from mesh)
      - { kind: weapon, index: 1, weapon-id: 3 }   # binds mesh HP_Weapon_1 (missile rack) — P2
      # Cockpit eye point for the first-person camera (client-only). No HP_Cockpit mesh node, so it
      # stays FULLY authored here (slightly above the centreline, forward of centre).
      - { kind: cockpit, off-y: 0.35, off-z: 0.9, dir-z: 1 }
    # Default hold: cannon 2 + missile rack 4 + proximity-mine (3) + sensor-decoy (1) + recon-probe (2) = 12 == capacity.
    # Probe mass is authored low (2, not a "realistic" 20) so a single pack fits alongside the
    # scout's loadout without ballooning payload-capacity for every hull.
    default-cargo:
      - { item: proximity-mine, count: 3 }
      - { item: sensor-decoy, count: 1 }
      - { item: recon-probe, count: 1 }

  # Fighter (class-id 1): twin boosters; twin wing cannons firing together.
  - id: fighter
    name: Fighter
    glyph: "◆"
    role: INTERCEPT
    description: "The all-rounder — twin cannons and enough armor to hold the line. Backbone of any squad."
    model-name: fighter
    model-length: 5.5
    class-id: 1
    mass: 36
    speed: 100
    thrust: 25
    max-turn-rates: { yaw: 60, pitch: 60, roll: 60 }
    strafe-thrust-multiplier: 0.5
    reverse-thrust-multiplier: 0.5
    drift-yaw-deg: 5
    drift-pitch-deg: 5
    ab-accel: 10
    ab-on-rate: 2.0
    ab-off-rate: 1.0
    max-fuel: 15          # burn time = max-fuel / ab-fuel-drain = 5 s
    ab-fuel-drain: 3.0    # per second while the afterburner is engaged
    ab-fuel-recharge: 0.5 # per second while boost is released (~30 s to full); 0 = dock-only (relaunch refills)
    armor-hit-points: 120
    shield-capacity: 60   # regenerating shield absorbed before hull
    shield-recharge: 8    # points/sec once the quiet delay elapses (~7.5 s to full)
    shield-delay: 3       # seconds after the last shield hit before recharge resumes
    vision-cone-length: 1200
    vision-cone-angle-deg: 20
    vision-sphere-radius: 450
    radar-signature: 1.0   # baseline detectability
    price: 200
    payload-capacity: 20 # twin cannons 2x5 + seeker rack 4 = 14 -> 6 free for cargo
    required-capabilities: [base]
    # GLB-authoritative geometry (HardpointGeometryMerge): each weapon/booster entry BINDS its mesh
    # HP_<Kind>_<Index> node and inherits its position/direction. The seeker rack keeps weapon-index 2
    # (AFTER the two guns 0/1) so the barrel spread-seed indices stay aligned on server + client.
    # Unclaimed mesh nodes append at the end (by kind, index): Thruster_0 + Light_0..4.
    hardpoints:
      - { kind: weapon, index: 0, weapon-id: 1 }   # binds mesh HP_Weapon_0 (left cannon)
      - { kind: weapon, index: 1, weapon-id: 1 }   # binds mesh HP_Weapon_1 (right cannon)
      - { kind: weapon, index: 2, weapon-id: 3 }   # binds mesh HP_Weapon_2 (seeker rack)
      - { kind: booster, index: 0 }                # binds mesh HP_Booster_0
      - { kind: booster, index: 1 }                # binds mesh HP_Booster_1
      # Cockpit eye point for the first-person camera (client-only). No HP_Cockpit mesh node, so it
      # stays FULLY authored here.
      - { kind: cockpit, off-y: 0.55, off-z: 1.4, dir-z: 1 }
    # Default hold: twin cannons 2x5 + seeker rack 4 = 14, + 2x sensor-decoy (3) = 20 == capacity.
    default-cargo:
      - { item: sensor-decoy, count: 2 }

  # Interceptor (stub — no model/class-id yet): the dock-only booster hull. Uncomment + assign
  # class-id when the hull lands.
  # - id: interceptor
  #   name: Interceptor
  #   class-id: 3
  #   ab-accel: 14
  #   ab-on-rate: 2.5
  #   ab-off-rate: 1.5
  #   max-fuel: 20
  #   ab-fuel-drain: 4.0
  #   ab-fuel-recharge: 0 # dock-only: no in-flight regen, full tank only on relaunch

  # Bomber (class-id 2): the heavy hull — twin main engines; twin main cannons + a missile rack.
  - id: bomber
    name: Bomber
    glyph: "⬢"
    role: ASSAULT
    description: "Slow and loud, but its payload cracks bases open. Bring an escort."
    model-name: bomber
    model-length: 7.2
    class-id: 2
    mass: 50
    speed: 60
    thrust: 15
    max-turn-rates: { yaw: 20, pitch: 20, roll: 20 }
    strafe-thrust-multiplier: 0.5
    reverse-thrust-multiplier: 0.5
    drift-yaw-deg: 8
    drift-pitch-deg: 8
    ab-accel: 0
    ab-on-rate: 2.0
    ab-off-rate: 1.0
    armor-hit-points: 240
    shield-capacity: 100  # the heavy hull carries the largest shield
    shield-recharge: 6    # points/sec once the quiet delay elapses (~16.7 s to full)
    shield-delay: 4       # seconds after the last shield hit before recharge resumes
    vision-cone-length: 1000
    vision-cone-angle-deg: 18
    vision-sphere-radius: 400
    radar-signature: 1.75  # big and loud — seen from much further away than a scout
    price: 350
    payload-capacity: 37 # twin cannons 2x11 + missile rack 4 = 26 -> 11 free for cargo; the payload hull carries the most
    required-capabilities: [base]
    # GLB-authoritative geometry (HardpointGeometryMerge). Twin main cannons BIND mesh HP_Weapon_0
    # (right barrel) and HP_Weapon_1 (left barrel), inheriting mesh position/direction as-is — a
    # symmetric forward gun pair, no authored override. The missile rack keeps weapon-index 2 (AFTER
    # the guns) so the guns' spread-seed indices (0/1) stay aligned, binding mesh HP_Weapon_2.
    # Unclaimed mesh nodes append at the end (by kind, index): Booster_0/1, Thruster_0, Turret_0, Light_0..4.
    # The rack on HP_Weapon_2 carries the anti-base torpedo (weapon-id 5) — the ONLY can-damage-base
    # weapon in the game; the bomber is the only hull that mounts it, so it stays the match-ender.
    hardpoints:
      - { kind: weapon, index: 0, weapon-id: 2 }   # binds mesh HP_Weapon_0 (right cannon barrel)
      - { kind: weapon, index: 1, weapon-id: 2 }   # binds mesh HP_Weapon_1 (left cannon barrel) — 2nd main cannon
      - { kind: weapon, index: 2, weapon-id: 5 }   # binds mesh HP_Weapon_2 (missile/torpedo rack)
      # Cockpit eye point for the first-person camera (client-only). No HP_Cockpit mesh node, so it
      # stays FULLY authored here.
      - { kind: cockpit, off-y: 0.7, off-z: 1.8, dir-z: 1 }
    # Default hold: twin cannons 2x11 + torpedo rack 4 = 26, + 8x proximity-mine (8) + sensor-decoy (3) = 37 <= 37.
    # 8 mines = one full cloud-count deploy; mine mass 1 keeps the whole field affordable.
    default-cargo:
      - { item: proximity-mine, count: 8 }
      - { item: sensor-decoy, count: 1 }

  # Escape pod (class-id 255): slow, unarmed lifeboat (no weapon hardpoint). The faction's lifepod.
  - id: pod
    name: Pod
    model-name: pod
    model-length: 2.8
    class-id: 255
    mass: 10
    speed: 60
    thrust: 15
    max-turn-rates: { yaw: 40, pitch: 40, roll: 40 }
    strafe-thrust-multiplier: 1.0
    reverse-thrust-multiplier: 1.0
    drift-yaw-deg: 8
    drift-pitch-deg: 8
    ab-accel: 0
    ab-on-rate: 2.0
    ab-off-rate: 1.0
    armor-hit-points: 20
    vision-sphere-radius: 250 # no cone — a lifepod has no forward sensor, just a short proximity bubble
    radar-signature: 0.35     # tiny lifeboat — hard to spot fleeing a wreck
    abilities: [is-lifepod, no-ripcord]
    required-capabilities: [base]
    hardpoints:
      - { kind: main-engine, off-z: -2.25, dir-z: -1 }
      # Cockpit eye point for the first-person camera (client-only). The pod is a tiny lifeboat, so
      # the eye sits close to the origin.
      - { kind: cockpit, off-y: 0.2, off-z: 0.3, dir-z: 1 }
