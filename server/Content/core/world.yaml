# World — the server's world/sim tuning file. Lives in content/core/ but is NOT part of the
# faction/tech-tree bundle manifest: the tech tree tunes buyable gameplay/balance, maps define the
# arena, and this file tunes the server's world defaults + sim. Stock ships next to the binary
# (content/core/world.yaml); SIM_WORLD / --world points at a replacement file (e.g. a Docker
# volume). Loaded standalone by WorldLoader at boot; a missing/malformed file fails fast.
#
# sector-scale multiplies authored per-sector radii; asteroid-density scales asteroid counts.
# fog-of-war toggles per-team vision filtering server-wide (off = behavior/bytes identical to no
# fog); fog-eyeball-multiplier scales a ship's vision-sphere radius for the outer "mesh renders but
# isn't radar-detected" tier (server-side only — never streamed). Reproduces stock.yaml's world block.
# fire-signature-boost multiplies a ship's radar signature the instant it fires (guns or missiles),
# decaying linearly back to 1x over fire-signature-window seconds (server-side only — never
# streamed); author 1.0 to disable.
#
# The remaining signature-pipeline knobs compose with the fire boost into one effective per-tick
# signature (SignatureModel): boost-signature-mult is the full-afterburner loudness (ramped by the
# live afterburner power), shield-signature-mult applies while a hull has an EQUIPPED shield
# (capacity > 0, regardless of the current pool), and dust-signature-mult applies scaled by the
# dust density at the ship's position (< 1 = hiding inside a cloud makes you QUIETER — this stacks
# with the sightline dust attenuation, so a ship in dust is doubly hard to see). signature-min/
# max-mult are safety rails: the composed value is clamped to [(base+bias)×min, (base+bias)×max].
# All server-side only (never streamed) and safe to sweep per-server — but they SHIFT fog
# detection ranges, so retune with the fog tests in mind. Authoring every mult at 1.0 restores
# the fire-boost-only behavior exactly.
#
# The ai/combat/mechanics/seeding blocks below are SERVER-SIDE sim tuning (never streamed): every
# key is optional and an omitted key keeps its stock value (the values written here ARE stock —
# they document the knobs and are safe to sweep without a client redeploy). Durations are seconds;
# the sim converts to ticks at its own rate.
id: 0
sector-scale: 2.25
# The single default sector radius (× sector-scale) for any map sector that omits `radius`. One
# shared default for every sector — no per-sector-id defaults. A map may override via `sector-radius`.
sector-radius: 700
asteroid-density: 1.0
debug-freeze-brain: false
debug-no-fire: false
fog-of-war: true
fog-eyeball-multiplier: 1.5
fire-signature-boost: 5
fire-signature-window: 3.0
boost-signature-mult: 1.4   # full afterburner is ~40% louder (scaled by live boost power)
shield-signature-mult: 1.15 # an equipped shield radiates — shielded hulls are seen slightly farther
dust-signature-mult: 0.5    # buried in dust = half as loud (stacks with sightline attenuation)
signature-min-mult: 0.1     # clamp rails on the composed signature, × (base + equipment bias)
signature-max-mult: 8.0
# Fog radar signatures of the static landmarks (ships/bases author theirs on their own defs).
aleph-radar-signature: 1.4
rock-radar-signature: 2.0

# PIG drone AI tuning (ported verbatim from the module) — difficulty/behavior knobs.
ai:
  brain-hz: 5              # AI decisions per second (steering still re-runs every sim tick)
  max-pigs-per-team: 5
  squad-delay-seconds: 10  # after a squad wipe before the next squad launches
  aggro-window-seconds: 3  # aggression memory
  spawn-stagger-seconds: 1.5 # gap between squad-mate launches
  patrol-reach-frac: 0.7   # patrol waypoints stay within this fraction of the sector radius
  patrol-arrive: 120       # re-roll a patrol waypoint once within this distance of it
  radar-range: 1200
  fire-range: 360
  standoff: 90             # attack-point shelling distance
  aim-deg: 6               # half-angle aim cone inside which a pig opens fire
  turn-gain: 3.2
  avoid-lookahead: 160
  avoid-margin: 14
  # Threat-scoring weights — the target-priority formula (first knobs to touch for difficulty).
  threat-aim-weight: 1.0
  threat-close-weight: 0.7
  threat-dmg-weight: 0.4
  threat-switch-margin: 1.3
  threat-base-weight: 2.5
  base-threat-radius: 700
  threat-bomber-bonus: 2.0 # extra threat score for Bomber-class enemies
  wander-period-seconds: 60   # before a pig re-rolls its wander sector
  bomber-respawn-seconds: 15  # cooldown before a team's bomber relaunches
  # Per-slot aiming skill spread: lead accuracy, turn snappiness, residual wobble.
  turn-gain-min: 2.2
  turn-gain-max: 4.4
  lead-frac-min: 0.55
  lead-frac-max: 1.0
  aim-wobble-max-rad: 0.05
  aim-wobble-rate: 0.11
  missile-hold-seconds: 4  # extra spacing between missile launches, on top of the rack's interval
  # Evasive side-thruster "juking".
  juke-range: 300
  juke-period-seconds: 0.65
  juke-amp-min: 0.45
  juke-amp-max: 1.0
  # Player-autopilot friendly-base docking maneuver (server-only; DockApproach Transit->Align->Creep).
  # dock-standoff: 25         # standoff-point distance outside the door plane (world units)
  # dock-clearance: 40        # detour ring radius past BaseRadius when routing around the base
  # dock-creep-throttle: 0.12 # throttle fraction while creeping down the door corridor (~19 u/s Scout)

# Collision damage + sector-boundary hazard (kinematics stay in the shared CollisionConfig —
# the client predicts bounces; damage is server-only).
combat:
  collision-damage-scale: 0.6      # ship-vs-static damage scale
  ship-ship-damage-scale: 1.2
  max-collision-damage: 30
  collision-damage-min-speed: 4    # below this closing speed a collision is a harmless kiss
  boundary-base-dps: 8             # outside-the-sector erosion: base + ramp per unit beyond, capped
  boundary-ramp-dps: 0.12
  boundary-max-dps: 60

# Warp gates, docking, escape pods, economy cadence, match flow.
mechanics:
  aleph-trigger-radius: 18   # gate mouth: ship warps AND bolts/missiles are absorbed within this radius
  warp-exit-offset: 10       # how far beyond the destination mouth a warping ship exits
  warp-exit-jitter: 0.02     # per-axis random spread on the exit cone
  paycheck-seconds: 60       # between flat per-team credit paychecks (amount = faction income)
  dock-radius-frac: 0.9      # dock when within this fraction of your OWN base radius
  launch-speed: 64           # u/s catapult out of the docking-exit hardpoint on spawn
  rescue-radius-mult: 4      # pod pickup distance, × ship collision radius
  pod-eject-speed: 90        # u/s initial fling (decays to the pod's max speed)
  pod-eject-spin: 5          # rad/s initial tumble (decays via angular drag)
  reconnect-grace-seconds: 5 # dropped ship held (simulated, vulnerable) for reconnect reclaim
  ended-to-lobby-seconds: 6  # after match end before the server returns to the lobby

# Map seeding: ONE shared default set per asteroid shape (field = shallow disc, belt = flattened
# ring), applied to any sector by its declared `asteroids` kind, plus team-base placement — counts
# derive from filled area, so density (spacing) is invariant to sector size — plus the ROCK-CLASS
# knobs deciding which rocks become harvestable helium-3 or a RARE special rock at world-gen. A
# sector is OVERWHELMINGLY common rock (Regolith), sprinkled with a fixed count of He3 (4 per
# ordinary sector, 2 in a team's home/garrison sector) and at most one special rock (Carbonaceous/
# Silicon/Uranium) — and home sectors roll home-special-chance (stock 0) for theirs. Maps override
# per-sector via he3-count, special-count. All server-side only (never streamed).
seeding:
  field-fill-frac: 0.9       # disc radius as a fraction of the sector radius
  field-flatten: 0.1         # disc half-thickness as a fraction of its radius (shallow)
  field-area-density: 4.5e-6 # field rocks per unit² of disc footprint (at asteroid-density 1)
  field-rock-min: 8
  field-rock-max: 55
  belt-inner-frac: 0.25      # belt inner radius / sector radius
  belt-outer-frac: 0.95      # belt outer radius / sector radius
  belt-flatten: 0.13         # belt half-thickness / sector radius (shallow)
  belt-area-density: 2.4e-5  # belt rocks per unit² of annulus (at asteroid-density 1)
  belt-rock-min: 6
  belt-rock-max: 40
  rock-size-skew: 1.8        # power-law size skew (> 1 biases toward small rocks)
  base-inner-frac: 0.14      # garrison radial band, as fractions of the sector radius
  base-outer-frac: 0.30
  base-y-jitter: 80          # garrison vertical jitter (y drawn in ± half this)
  he3-per-sector: 4          # guaranteed He3 rocks per ordinary (non-home) sector
  he3-per-home-sector: 2     # a team's HOME (garrison) sector is leaner: exactly 2 He3 rocks
  special-per-sector: 1      # RARE special rocks per sector; everything else is common Regolith
  home-special-chance: 0.0   # chance a HOME sector gets its specials at all (0 = never; per-seed roll)
  special-rock-radius-mult: 3 # landmark sizing for the rare specials (1 = no change)

# Mining + ore economy: how the AI miner economy is tuned and how much ore a He3 rock holds (which
# rocks BECOME He3/special is decided by the rock-class knobs under `seeding:`). Per-rock He3
# capacity scales with the rock's SIZE and is CLAMPED into [ore-capacity-min, ore-capacity-max]:
# a min-size rock sits at the floor, a max-size one at the ceiling, ore-richness-mult scales within
# the band, and the clamp guarantees the bounds (so a tiny rock never drops below the floor). A map
# may raise/lower the band map-wide or per-sector (map/sector ore-capacity-min/max). All server-side
# only (never streamed) — the client only sees the results.
mining:
  max-miners-per-team: 4        # cap on live AI miners a team may field at once
  harvest-rate-per-second: 40   # ore units a miner pulls from a rock per second
  credits-per-ore-unit: 1     # team credits granted per ore unit offloaded at base
  offload-delay-seconds: 5      # dwell after an offload before the miner relaunches
  ore-capacity-min: 8000        # per-He3-rock capacity FLOOR (a min-size rock; the hard clamp lower bound)
  ore-capacity-max: 32000       # per-He3-rock capacity CEILING (a max-size rock); midpoint ~20000 vs the 2000-unit miner hold
  shrink-floor-frac: 0.4        # a fully-mined rock shrinks toward this fraction of its spawn radius
  miner-standoff: 50            # harvest range from a target rock's surface, world units
  retreat-health-frac: 0.8      # hull fraction below which a miner abandons mining and returns to base

# Constructor / base-building tuning: the drone-wide beats of the build sequence. The PER-STATION
# beats live in stations.yaml on each buildable station: align-time-seconds (dwell nose-locked at
# the standoff shell before creeping in) and build-time-seconds (how long the build sphere runs).
# Build sequence: ToRock (full speed) -> Aligning (align-time-seconds, holding at standoff) ->
# Approaching (approach-speed creep until the hull TOUCHES the rock) -> Sinking (sink-speed creep
# until embedded sink-depth-frac below the surface; the build sphere emerges from the rock center
# here) -> Building (build-time-seconds; sphere envelops the rock) -> base appears, drone consumed.
constructor:
  max-constructors-per-base: 4  # cap on live constructors a single garrison may build at once (no team-wide cap)
  production-seconds: 20        # garrison production dwell after purchase, before the drone launches
  approach-speed: 8             # creep speed standoff -> surface contact, world units/second
  sink-speed: 3                 # creep speed surface contact -> embedded, world units/second
  standoff: 60                  # extra reach past the rock surface where ToRock "arrives" (align shell)
  sink-depth-frac: 0.65         # embed depth: fraction of the rock radius below the surface
  sink-backstop-seconds: 30     # force the build to start if the embed creep stalls this long
