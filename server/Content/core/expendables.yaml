# Expendables — the consumables the hangar's CARGO HOLD stocks. cargo-id (the stable wire id),
# mass (payload units per PACK carried, against the hull's payload-capacity), charges-per-pack
# and glyph are explicit runtime extensions; the rest is core Allegiance.Factions expendable data.
# Dispenser expendables (mines/chaff) are LOADED IN PACKS: the hangar count is a number of packs,
# each pack costs one `mass` and holds `charges-per-pack` charges, and one charge is distributed per
# press (total charges = packs × charges-per-pack). Omit charges-per-pack ⇒ 1 (one-for-one legacy).
# NOTE: hulls.yaml default-cargo counts are therefore PACK counts. Streamed to clients as
# CargoItemDef; the missile racks below carry their own magazine (launchers.yaml amount) instead.
#
# Missiles that a launcher fires (launchers.yaml, weapon-id racks) also carry a guidance/lock stat
# block projected onto the missile-kind WeaponDef: acceleration/turn-rate (deg/s)/initial-speed/
# max-speed drive flight; lock-time (s)/lock-angle (rad cone half-angle)/max-lock (u range) drive the
# server lock timer; power/width are damage + proximity-fuse radius; lifespan (s) is flight time.
# Warhead: a direct (fuse-triggering) hit deals power * direct-hit-multiplier; every OTHER enemy ship
# within blast-radius (u) of the detonation takes blast-power splash — full inside the fuse radius
# (width), inverse-square falloff beyond it, nothing past blast-radius. The
# smoke trail is YAML-tweakable: model-name (assets/missiles/<name>.glb), trail-lifetime/trail-scale
# (client EngineGlow plume) and trail-color (RRGGBB[AA] hex). CoreValidator refuses to boot a launcher
# whose missile leaves any of these unauthored. can-damage-base (omit-when-default false) flags a
# warhead as able to damage bases (a base is a lockable target only for such a weapon).
#
# Iron Coalition ordnance import (Phase 6, PCore014.igc) — full replacement of the placeholder
# AI-invented expendables (seeker-missile/dart-missile/anti-base-torpedo/proximity-mine/
# sensor-decoy/recon-probe). The IGC Iron Coalition extraction (.claude/skills/igc-format
# igc_parser.py --iron-slice, D8 offsets) is the source of truth for what should be available; every
# stat below is translated through OUR-MAGNITUDE anchors × IGC RATIOS (keep-our-magnitudes, not
# IGC-literal):
#   - Missiles anchor `seeker-missile` -> `mrm-seeker-1` (power x0.75, lock-time x0.75, accel x2/3,
#     turn-rate ~x83.3 deg per IGC rad/s).
#   - Mines anchor `proximity-mine` -> `prox-mine-1` (power x0.15, cloud-radius x0.8, lifespan =
#     IGC endurance x0.03).
#   - Chaff anchors `sensor-decoy` -> `counter-1` (chaff-strength x2/3).
#   - Probes anchor `recon-probe` -> `ews-probe-1` (sight-radius x9.6).
# Judgment calls (not straight anchor math): MRM Quickfire turn-rate capped 120/160/200 deg/s (the
# raw IGC 6/8/10 rad/s would out-turn every ship in the game); Quickfire fire-interval-ticks floored
# at 10 in launchers.yaml (the IGC 0.25s load time would be a DPS hose). SRM Anti-Base keeps our
# LOCK-BASED siege identity (lock-time 3.0s / lock-angle 0.35 / max-lock 1500 / chaff-resistance 2.5)
# rather than the IGC instant-lock (lockTime 0 in the record) — siege orders/PIG siege/MissileTest are
# all lock-based; its power IS authored IGC-faithful (300/375/375 — a garrison falls in ~7 tier-1 hits
# vs 11 pre-import). SRM Dumbfire (`srm-dumbfire-*`) is a normal GUIDED missile with a quick lock
# (0.5/0.4/0.3s) and a low turn-rate (67 deg/s, IGC 0.80 rad/s) — NOT an unguided path; the IGC
# lockTime 0 means "instant lock", not "no lock". IGC blast/width fields are 0 on every missile
# record — we keep our own per-role fuse-width/blast-power/blast-radius values.
