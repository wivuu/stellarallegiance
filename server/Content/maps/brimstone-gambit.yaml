# Brimstone Gambit — the default stock map.
#
# Maps are STANDALONE files (not part of the faction/tech-tree content). Stock maps ship next to the
# binary in content/maps/; operators add more by dropping .yaml files into the folder named by
# SIM_MAPS_DIR / --maps-dir. Select a map with SIM_MAP / --map "<name>" (default: "Brimstone Gambit").
#
# A map MUST declare a name and at least one garrison (a team home base). ALL sector geometry is
# data-driven here — there is no per-sector-id special-casing. Anything a sector omits falls back to
# ONE shared default:
#   radius        absolute world units; omit → `sector-radius` (below, or the world default) × scale.
#   garrison      { team: N } → a home base for team N here. The SET of garrisons = the teams the map
#                 supports (this stock map = 2 teams). Omit → no base in this sector.
#   asteroids     field (disc) | belt (ring) | none. Omit → field. `asteroid-density` scales the count.
#   map-pos       [x, y] normalized ~[-1,1] — where the sector's node draws on the minimap / lobby
#                 preview (star/custom layouts). Omit → the client auto-lays sectors on a ring.
#   dust          a "feel" block: amount (0..1 how dusty, VISUAL coverage/count/thickness) + optional
#                 opacity (0..1 how heavily it cuts RADAR/vision, default 1 — decoupled from amount so a
#                 big fluffy cloud can be radar-thin or a light haze radar-opaque) + color + optional
#                 seed. All derived RELATIVE to sector size, so the same block reads identically in any-
#                 sized sector. Omit the whole block → no dust AND no dust shadow-shafts in that sector.
#   sun / nebula  the sector's lighting + backdrop. sun.ambient (optional) sets the sector's ambient/
#                 fill light energy — the flat base illumination independent of the directional sun, so
#                 a sector can read brighter or murkier overall; omit → the client default.
#
# `links` lists the gate (aleph) edges as sector-id pairs; omitted → the sim rings the sectors by id.
name: Brimstone Gambit

# Default radius (× world sector-scale) for any sector that omits `radius`.
sector-radius: 700

links:
  - [0, 1]

sectors:
  - id: 0        # Delamere — team 0's home; an explicit larger arena
    name: Delamere
    radius: 4725
    map-pos: [-1.0, 0.0]
    garrison: { team: 0 }
    asteroids: field
    environment:
      sun:
        azimuth: 40
        elevation: 22
        color: [1.0, 0.86, 0.62]
        energy: 1.35
        ambient: 0.6               # soft fill so the big home arena reads open and lit
        god-rays: 1
      nebula:
        color-a: [0.42, 0.20, 0.55]
        color-b: [0.20, 0.34, 0.68]
        intensity: 0.08
      # dust:
      #   amount: 0.15              # light, dusky haze in the big home arena
      #   opacity: 0.2             # radar cut at full strength for this amount (sightlines badly reduced)
      #   color: [0.26, 0.24, 0.3]  # dusky space dust

  - id: 1        # Verge — team 1's home; smaller, meaner, a dense rusty belt
    name: Verge
    radius: null                 # → sector-radius (700) × scale
    map-pos: [1.0, 0.0]
    garrison: { team: 1 }
    asteroids: belt
    asteroid-density: 1.25       # a denser, meaner belt than stock
    environment:
      sun:
        azimuth: -25
        elevation: 22
        color: [1.0, 0.66, 0.48]  # low amber brimstone sun (warm key, not pure red)
        energy: 1.4
        ambient: 0.28             # low fill — the brimstone belt sits in murkier shadow
        god-rays: 0.5
      nebula:
        color-a: [0.5, 0.22, 0.2]
        color-b: [0.26, 0.14, 0.32]
        intensity: 0.07
      dust:
        amount: 0.85             # thick — visually dense rusty murk
        opacity: 1.0             # radar cut at full strength for this amount (sightlines badly reduced)
        color: [0.22, 0.14, 0.12] # dark rusty brimstone dust
