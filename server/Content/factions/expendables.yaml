# Expendables — the consumables the hangar's CARGO HOLD stocks. cargo-id (the stable wire id),
# mass (payload units per unit carried, against the hull's payload-capacity) and glyph are explicit
# runtime extensions; the rest is core Allegiance.Factions expendable data. Cargo is hangar/UI-side
# today (Stage 2 wires the sim behaviors — launch/arm/decoy); streamed to clients as CargoItemDef.
#
# Missiles that a launcher fires (launchers.yaml, weapon-id racks) also carry a guidance/lock stat
# block projected onto the missile-kind WeaponDef: acceleration/turn-rate (deg/s)/initial-speed/
# max-speed drive flight; lock-time (s)/lock-angle (rad cone half-angle)/max-lock (u range) drive the
# server lock timer; power/width are damage + proximity-fuse radius; lifespan (s) is flight time.
# Warhead: a direct (fuse-triggering) hit deals power * direct-hit-multiplier; every OTHER enemy ship
# within blast-radius (u) of the detonation takes blast-power splash — full inside the fuse radius
# (width), inverse-square falloff beyond it, nothing past blast-radius. The
# smoke trail is YAML-tweakable: model-name (assets/missiles/<name>.glb), trail-lifetime/trail-scale
# (client EngineGlow plume) and trail-color (RRGGBB[AA] hex). CoreValidator refuses to boot a launcher
# whose missile leaves any of these unauthored. can-damage-base (omit-when-default false) flags a
# warhead as able to damage bases (a base is a lockable target only for such a weapon).
missiles:
  # Seeker (weapon-id 3 rack): slow, hard-hitting, patient tracker.
  - id: seeker-missile
    name: Seeker Missile
    description: Lock-on ordnance. Fired from the hold.
    mass: 4
    lifespan: 8
    initial-speed: 90
    acceleration: 40
    max-speed: 220
    turn-rate: 80       # deg/s guidance limit
    lock-time: 2.0      # seconds in-cone to lock
    lock-angle: 0.5     # lock cone half-angle, radians
    max-lock: 1200      # lock range, u
    chaff-resistance: 1.0  # baseline: shrugs off a lone chaff puff about half the time
    power: 45
    width: 1            # proximity-fuse margin
    direct-hit-multiplier: 1.5
    blast-power: 30     # splash at the detonation point
    blast-radius: 25    # splash cutoff, u
    model-name: mis09
    trail-lifetime: 0.7
    trail-scale: 0.45
    trail-color: "ffc890ff"  # warm booster plume

  # Dart (weapon-id 4 rack): fast, weak, barely tracks — a harasser.
  - id: dart-missile
    name: Dart Missile
    description: Fast fire-and-forget dart. Barely tracks.
    mass: 3
    lifespan: 5
    initial-speed: 180
    acceleration: 80
    max-speed: 320
    turn-rate: 30       # deg/s — sluggish guidance
    lock-time: 1.0
    lock-angle: 0.4
    max-lock: 1000
    chaff-resistance: 0.5  # a cheap harasser is easily decoyed
    power: 18
    width: 2
    direct-hit-multiplier: 1.25
    blast-power: 10     # thin splash — a harasser, not a bomber
    blast-radius: 12
    model-name: mis01
    trail-lifetime: 0.4
    trail-scale: 0.3
    trail-color: "aaccffcc"  # cool, thin plume

  # Anti-base torpedo (weapon-id 5 rack): heavy siege ordnance, barely steers, hits stations hard.
  - id: anti-base-torpedo
    name: Anti-Base Torpedo
    description: Heavy siege torpedo. Locks onto enemy stations.
    mass: 6
    lifespan: 12
    initial-speed: 60
    acceleration: 25
    max-speed: 140
    turn-rate: 25        # deg/s — barely steers; meant for a static target
    lock-time: 3.0
    lock-angle: 0.35
    max-lock: 1500
    chaff-resistance: 2.5  # heavy siege guidance barely notices chaff
    power: 200
    width: 1             # minimal fuse margin — vs the base it's ignored anyway (exact hull contact)
    direct-hit-multiplier: 1.0
    blast-power: 40      # splashes defenders near the impact, never the base
    blast-radius: 30
    can-damage-base: true
    model-name: mis09    # reuse existing GLB until a torpedo model lands
    trail-lifetime: 1.0
    trail-scale: 0.6
    trail-color: "ff9060ff"

mines:
  # Deployed as a FIELD that behaves as ONE damage VOLUME: a drop scatters cloud-count mine MESHES
  # within cloud-radius behind the ship (cosmetic only — the meshes are never hit-detected). After
  # arm-delay the whole cloud-radius sphere is lethal: any enemy inside takes power damage-per-second
  # SCALED BY ITS OWN SPEED (mines are static, so a fast plow-through hurts and a near-stationary ship
  # takes ~0), every tick, for the field's lifespan. One deploy costs ONE mine-cargo unit regardless of
  # cloud-count (the meshes are decoration, not per-mine ammo). model-name is the GLB the client
  # instances per visual mine (assets/mines/<name>.glb).
  - id: proximity-mine
    name: Proximity Mine
    description: Dropped behind the ship; arms after 2s.
    cargo-id: 2
    mass: 1             # payload cost per deployable field (one drop = one field)
    glyph: "◈"
    model-name: acs41    # GLB instanced per visual mine (assets/mines/acs41.glb)
    lifespan: 60         # field lifetime, s
    power: 120           # damage-PER-SECOND at reference speed, scaled by the victim's speed
    cloud-radius: 30     # radius the field scatters its mines within AND the lethal sphere radius, u (tight, dense cluster)
    cloud-count: 48      # mine meshes scattered per deploy — cosmetic density (<= 64)
    arm-delay: 2.0       # seconds before the field arms

chaffs:
  - id: sensor-decoy
    name: Countermeasures
    description: Fakes the ship's signature for pursuers.
    cargo-id: 3
    mass: 3
    glyph: "◇"
    model-name: acs40    # GLB the client instances for the decoy (assets/chaff/acs40.glb)
    lifespan: 3          # puff lifetime, s
    chaff-strength: 1.0  # decoy strength vs a missile's chaff-resistance
    decoy-radius: 60     # u within which a missile can be lured onto this puff
