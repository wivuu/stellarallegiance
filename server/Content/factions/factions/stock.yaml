# The single stock faction (Stage-1 = one bundle; multi-faction asymmetry is a Stage-4 concern on
# this same model). Seeds the team's owned tech/capability state and names the lifepod + start base.
# bonus-money/income-money feed Stage-2 credits; base-capabilities [base] makes the stock catalog
# buildable.
#
# Economy (Stage-2, tunable): each team starts a match with bonus-money credits and earns income-money
# credits per paycheck (every Simulation.PaycheckTicks = 20 ticks = 1 s). So: start 1000, +100/s.
id: stock
name: Stock
base-capabilities: [base]
bonus-money: 1000
income-money: 100
lifepod-hull-id: pod
initial-station-id: garrison
