name: asteroids

# Generates the asteroid mesh + normal-map catalog in a headless container and
# uploads the artifacts. Meshes/maps are build outputs and are never committed.
on:
  # push:
  #   paths:
  #     - "tools/asteroid-gen/**"
  #     - ".github/workflows/asteroids.yml"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/asteroid-gen
    steps:
      - uses: actions/checkout@v4

      - name: Build generator image
        run: docker build -t asteroid-gen .

      - name: Generate catalog
        run: |
          mkdir -p build
          docker run --rm -v "$PWD/build:/out" asteroid-gen

      - name: Upload asteroid assets
        uses: actions/upload-artifact@v4
        with:
          name: asteroids
          path: tools/asteroid-gen/build/
          if-no-files-found: error
