name: Build Godot Client

on:
  # push:
  # pull_request:
  workflow_dispatch:

env:
  GODOT_VERSION: 4.7.0
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_CLI_USE_MSBUILD_SERVER: 0
  MSBUILDDISABLENODEREUSE: 1
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            preset: Linux
            artifact_name: stellarallegiance-linux
            artifact_path: build/linux
            output_path: build/linux/stellarallegiance.x86_64
          - name: macOS
            os: macos-latest
            preset: macOS
            artifact_name: stellarallegiance-macos
            artifact_path: build/mac
            output_path: build/mac/stellarallegiance.zip
          - name: Windows
            os: windows-latest
            preset: Windows Desktop
            artifact_name: stellarallegiance-windows
            artifact_path: build/win
            output_path: build/win/stellarallegiance.exe

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: true
          include-templates: true
          cache: true

      - name: Restore client dependencies
        run: dotnet restore client/stellarallegiance.csproj

      - name: Generate Godot C# solution
        run: godot --headless --path client --build-solutions --quit

      # .glb.import sidecars are gitignored — a fresh checkout must import before export or every
      # model silently falls back to its procedural placeholder (see release.yml for details).
      - name: Import assets
        run: |
          ec=0
          godot --headless --path client --import || ec=$?
          echo "import exit: $ec"
          if [ "$ec" -ne 0 ] && [ "$ec" -ne 139 ]; then exit "$ec"; fi
          test -f client/assets/bases/garrison.glb.import || { echo "::error::GLB import produced no sidecars — exported client would ship placeholder meshes"; exit 1; }

      - name: Create export directory
        run: mkdir -p "$GITHUB_WORKSPACE/$(dirname "${{ matrix.output_path }}")"

      - name: Export ${{ matrix.name }} client
        run: godot --headless --path client --export-release "${{ matrix.preset }}" "$GITHUB_WORKSPACE/${{ matrix.output_path }}"

      - name: Upload ${{ matrix.name }} artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
